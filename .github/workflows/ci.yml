name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CI: true

jobs:
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          git log --oneline -1

      - name: Show Node.js version
        run: node --version

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: Run Prettier
        run: npm run format:check
        continue-on-error: false

      - name: Lint markdown files (Informational)
        run: npx --yes markdownlint-cli2 "**/*.md"
        continue-on-error: true

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          git log --oneline -1

      - name: Show Node.js version
        run: node --version

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          # Mock environment variables for testing
          RIVERSYNC_PAT: test-token-riversync
          MULA_PAT: test-token-mula

  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          git log --oneline -1

      - name: Show Node.js version
        run: node --version

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build project
        run: npm run build

      - name: Check build output
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed: dist/index.js not found"
            exit 1
          fi
          echo "Build successful: dist/index.js created"

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          git log --oneline -1

      - name: Show Node.js version
        run: node --version

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level moderate

  validate-mcp:
    name: Validate MCP Server
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          git log --oneline -1

      - name: Show Node.js version
        run: node --version

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Test MCP server startup
        run: |
          timeout 10s node dist/index.js --test || true
          echo "MCP server startup test completed"

      - name: Validate MCP schema
        run: npm run validate:mcp

  release:
    name: Release & Publish
    runs-on: ubuntu-latest
    needs: [lint, test, build, security, validate-mcp]
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          git log --oneline -1

      - name: Show tool versions
        run: |
          node --version
          npm --version
          gh --version

      - name: Install dependencies
        run: npm ci

      - name: Build for release
        run: npm run build

      - name: Create release package
        run: |
          mkdir -p release
          cp -r dist/ release/
          cp package.json README.md LICENSE release/
          cp config/environments.example.json release/

      - name: Create GitHub Release Assets
        run: |
          tar -czf devops-enhanced-mcp-${{ github.event.release.tag_name }}.tar.gz -C release .
          zip -r devops-enhanced-mcp-${{ github.event.release.tag_name }}.zip release/

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "devops-enhanced-mcp-${{ github.event.release.tag_name }}.tar.gz" \
            "devops-enhanced-mcp-${{ github.event.release.tag_name }}.zip" \
            --clobber

  post-deploy:
    name: Post-Deployment Validation
    runs-on: ubuntu-latest
    needs: [release]
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          git log --oneline -1

      - name: Validate release
        run: |
          echo "Release ${{ github.event.release.tag_name }} validation"
          echo "✅ Build artifacts created successfully"
          echo "✅ Security scans passed"
          echo "✅ MCP server validation completed"
          echo "✅ Release packages uploaded"

      - name: Notify success
        run: |
          echo "🎉 Azure DevOps MCP Proxy ${{ github.event.release.tag_name }} deployed successfully!"
