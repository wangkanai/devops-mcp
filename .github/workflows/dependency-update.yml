name: Dependency Updates

permissions:
  contents: write
  pull-requests: write
  issues: write
on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF_NAME}"
          git checkout -B "${GITHUB_REF_NAME}" FETCH_HEAD
          git log --oneline -1

      - name: Show Node.js version
        run: node --version

      - name: Check for outdated packages
        run: |
          npm outdated --json > outdated.json || true
          if [ -s outdated.json ]; then
            echo "Outdated packages found:"
            cat outdated.json
            echo "HAS_UPDATES=true" >> $GITHUB_ENV
          else
            echo "All packages are up to date"
            echo "HAS_UPDATES=false" >> $GITHUB_ENV
          fi

      - name: Update dependencies
        if: env.HAS_UPDATES == 'true'
        run: |
          # Update patch and minor versions only
          npm update
          
          # Check if package-lock.json changed
          if git diff --quiet package-lock.json; then
            echo "No dependency updates needed"
            echo "CHANGES_MADE=false" >> $GITHUB_ENV
          else
            echo "Dependencies updated"
            echo "CHANGES_MADE=true" >> $GITHUB_ENV
          fi

      - name: Run tests after update
        if: env.CHANGES_MADE == 'true'
        run: |
          npm ci
          npm run build
          npm test

      - name: Configure git
        if: env.CHANGES_MADE == 'true'
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Push branch and create pull request
        if: env.CHANGES_MADE == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/dependency-updates"
          git checkout -B "$BRANCH"
          git add package.json package-lock.json
          git commit -m "chore: update dependencies"
          git push --force-with-lease origin "$BRANCH"
          printf '%s\n' \
            '## Dependency Updates' \
            '' \
            'This PR contains automated dependency updates.' \
            '' \
            '- Updated npm dependencies to latest patch/minor versions' \
            '- Verified tests and build after update' \
            '- Generated by GitHub Actions' > pr-body.md
          gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "$BRANCH" \
            --title "chore: automated dependency updates" \
            --body-file pr-body.md || true

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_REF_NAME}"
          git checkout -B "${GITHUB_REF_NAME}" FETCH_HEAD
          git log --oneline -1

      - name: Show Node.js version
        run: node --version

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: |
          # Run audit and capture output
          npm audit --audit-level moderate --json > audit-results.json || true
          
          # Check if vulnerabilities found
          if [ -s audit-results.json ]; then
            VULN_COUNT=$(cat audit-results.json | jq '.metadata.vulnerabilities.total // 0')
            if [ "$VULN_COUNT" -gt 0 ]; then
              echo "🚨 Security vulnerabilities found: $VULN_COUNT"
              echo "VULNERABILITIES_FOUND=true" >> $GITHUB_ENV
              cat audit-results.json | jq '.vulnerabilities'
            else
              echo "✅ No security vulnerabilities found"
              echo "VULNERABILITIES_FOUND=false" >> $GITHUB_ENV
            fi
          else
            echo "✅ Security audit completed successfully"
            echo "VULNERABILITIES_FOUND=false" >> $GITHUB_ENV
          fi

      - name: Create security issue
        if: env.VULNERABILITIES_FOUND == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node -e "const fs=require('fs'); const auditResults=JSON.parse(fs.readFileSync('audit-results.json','utf8')); const body=['## Security Audit Report','', 'Total vulnerabilities found: '+(auditResults.metadata?.vulnerabilities?.total || 0), '', '- Critical: '+(auditResults.metadata?.vulnerabilities?.critical || 0), '- High: '+(auditResults.metadata?.vulnerabilities?.high || 0), '- Moderate: '+(auditResults.metadata?.vulnerabilities?.moderate || 0), '- Low: '+(auditResults.metadata?.vulnerabilities?.low || 0), '', '```json', JSON.stringify(auditResults.vulnerabilities, null, 2), '```', ''].join('\n'); fs.writeFileSync('issue-body.md', body);"
          gh issue create \
            --title "Security vulnerabilities detected in dependencies" \
            --body-file issue-body.md \
            --label security \
            --label automated \
            --label vulnerability || true
